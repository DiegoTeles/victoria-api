services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vic
      POSTGRES_PASSWORD: vic
      POSTGRES_DB: vic
    ports:
      - "5432:5432"
    volumes:
      - vic_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vic -d vic"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://vic:vic@postgres:5432/vic
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-dev-password}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vic_pg_data:
